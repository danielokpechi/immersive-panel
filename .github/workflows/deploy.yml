name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages on every push
# to main. The Ably key is injected at build time from a repo secret so
# cross-device live control works on the deployed site.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Must match the GitHub Pages project path (repo name).
          BASE_PATH: /immersive-panel/
          # Add this under Settings → Secrets and variables → Actions.
          VITE_ABLY_KEY: ${{ secrets.VITE_ABLY_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
